<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#1F4529"/>
  <rect x="8" y="8" width="784" height="584" rx="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="8 4"/>
  <!-- Golf Mat Icon -->
  <g transform="translate(400, 250)" opacity="0.3">
    <!-- Mat base -->
    <rect x="-60" y="-10" width="120" height="50" rx="4" fill="none" stroke="white" stroke-width="3"/>
    <!-- Mat texture lines -->
    <line x1="-45" y1="5" x2="-45" y2="25" stroke="white" stroke-width="1.5"/>
    <line x1="-30" y1="5" x2="-30" y2="25" stroke="white" stroke-width="1.5"/>
    <line x1="-15" y1="5" x2="-15" y2="25" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="5" x2="0" y2="25" stroke="white" stroke-width="1.5"/>
    <line x1="15" y1="5" x2="15" y2="25" stroke="white" stroke-width="1.5"/>
    <line x1="30" y1="5" x2="30" y2="25" stroke="white" stroke-width="1.5"/>
    <line x1="45" y1="5" x2="45" y2="25" stroke="white" stroke-width="1.5"/>
    <!-- Tee -->
    <line x1="0" y1="-10" x2="0" y2="-30" stroke="white" stroke-width="2.5"/>
    <!-- Ball on tee -->
    <circle cx="0" cy="-38" r="8" fill="none" stroke="white" stroke-width="2.5"/>
    <!-- Elevated legs -->
    <line x1="-50" y1="40" x2="-55" y2="60" stroke="white" stroke-width="2.5"/>
    <line x1="50" y1="40" x2="55" y2="60" stroke="white" stroke-width="2.5"/>
  </g>
  <text x="400" y="350" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" letter-spacing="1">Elevated Mats</text>
  <text x="400" y="385" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400">Replace with real photo</text>
</svg>